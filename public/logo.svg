<svg viewBox="0 0 168 44" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="44" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="fGrad" x1="8" y1="10" x2="36" y2="34" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#DDD6FE"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="52" y1="0" x2="168" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#EDE9FE"/>
    </linearGradient>
  </defs>

  <!-- Icon background -->
  <rect width="44" height="44" rx="10" fill="url(#bgGrad)"/>

  <!-- Subtle inner shine -->
  <rect x="0" y="0" width="44" height="22" rx="10" fill="white" fill-opacity="0.07"/>

  <!-- F lettermark — vertical stem -->
  <rect x="11" y="10" width="3.5" height="24" rx="1.75" fill="url(#fGrad)"/>

  <!-- F top bar -->
  <rect x="11" y="10" width="18" height="3.5" rx="1.75" fill="url(#fGrad)"/>

  <!-- F middle bar (shorter, with arrow tip) -->
  <rect x="11" y="20.25" width="13" height="3.5" rx="1.75" fill="url(#fGrad)"/>

  <!-- Arrow tip on middle bar (flow indicator) -->
  <path d="M23.5 22 L28 19 L28 25 Z" fill="#C4B5FD"/>

  <!-- Dot accent (bottom right) -->
  <circle cx="33.5" cy="33.5" r="2.5" fill="#A78BFA" fill-opacity="0.9"/>

  <!-- Wordmark -->
  <text
    x="54"
    y="30"
    font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif"
    font-size="19"
    font-weight="700"
    letter-spacing="-0.6"
    fill="url(#textGrad)"
  >flowfiy</text>
</svg>
