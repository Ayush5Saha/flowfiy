<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#3730A3"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="48" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C4B5FD" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="48" height="48" rx="12" fill="url(#bg)"/>

  <!-- Inner glow overlay -->
  <rect width="48" height="48" rx="12" fill="white" fill-opacity="0.05"/>

  <!-- F lettermark — vertical stroke -->
  <line x1="13" y1="12" x2="13" y2="36" stroke="url(#glow)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- F lettermark — top horizontal bar -->
  <line x1="13" y1="12" x2="35" y2="12" stroke="url(#glow)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- F lettermark — middle horizontal bar (slightly curved for flow) -->
  <path d="M13 23.5 C18 21.5 23 21.5 29 23.5" stroke="url(#glow)" stroke-width="3.5" stroke-linecap="round" fill="none"/>

  <!-- Flow dot accent -->
  <circle cx="33" cy="23.5" r="2.2" fill="#C4B5FD"/>
</svg>
